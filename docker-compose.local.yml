services:
  mongo:
    build:
      context: .
      dockerfile: infra/db/Dockerfile
    image: agentic-healthcare-assistant-mongo:7.0.14
    container_name: agentic-healthcare-assistant-local-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
      APP_DB_NAME: ${APP_DB_NAME:-healtcare-agent-db}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-healtcare}
    volumes:
      - mongo_local_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: &default-logging
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: agentic-healthcare-assistant-local-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_local_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://127.0.0.1:9000/minio/health/live",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

volumes:
  mongo_local_data:
  minio_local_data:
