services:
  mongo:
    build:
      context: .
      dockerfile: db.Dockerfile
    image: agentic-healthcare-assistant-mongo:7.0.14
    container_name: agentic-healthcare-assistant-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
      APP_DB_NAME: ${APP_DB_NAME:-healtcare-agent-db}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-healtcare}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo_data:
